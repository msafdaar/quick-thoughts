name: Android Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Global Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.7 # Tells GitHub to install Gradle globally, bypassing the missing 'gradlew' script!

    - name: Assemble Debug APK
      run: gradle assembleDebug

    - name: Upload Compiled APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7